name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify IndexNow
        run: |
          curl -sS -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "snapcents.app",
              "key": "95ef4507cb7700dbf7427957079b51d1",
              "keyLocation": "https://snapcents.app/95ef4507cb7700dbf7427957079b51d1.txt",
              "urlList": [
                "https://snapcents.app/",
                "https://snapcents.app/privacy",
                "https://snapcents.app/terms",
                "https://snapcents.app/faq",
                "https://snapcents.app/vs-ynab",
                "https://snapcents.app/blog",
                "https://snapcents.app/sitemap.xml"
              ]
            }' || echo "IndexNow ping failed (non-fatal)"
